# ═══════════════════════════════════════════════════════════════════════════════
# InstaAgent — GitHub Actions CI/CD Pipeline
# Triggers: push to main (deploy) + PRs (test only)
# Jobs: lint → test → build → deploy (Render + Vercel)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── Jobs ────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Backend: Lint + Type Check ──────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./instaagent/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.8.4 mypy==1.13.0 types-redis types-PyYAML

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ── 2. Backend: Tests ──────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./instaagent/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: sk-test-fake
          SUPABASE_URL:       https://fake.supabase.co
          SUPABASE_ANON_KEY:  fake_key
          SUPABASE_SERVICE_KEY: fake_service_key
          JWT_SECRET:         test_jwt_secret_32_chars_minimum_xx
          REDIS_URL:          redis://localhost:6379
          ENCRYPTION_KEY:     dGVzdF9lbmNyeXB0aW9uX2tleV8zMl9ieXRlc3h4eA==
          AI_SIMULATION:      "true"
          INSTAGRAM_SIMULATE: "true"
          ENVIRONMENT:        test
          REMOVEBG_API_KEY:   test
          PHOTOROOM_API_KEY:  test
          TELEGRAM_BOT_TOKEN: "123456789:AATestFakeToken"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./instaagent/backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ── 3. Frontend: Build ─────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./instaagent/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: instaagent/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: /api/v1
        run: npm run build

  # ── 4. Docker Build & Push (main branch only) ──────────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./instaagent/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./instaagent/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: NEXT_PUBLIC_API_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to Render (backend) + Vercel (frontend) ─────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" \
            --fail --silent --show-error
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./instaagent/frontend
          vercel-args: --prod
        if: ${{ secrets.VERCEL_TOKEN != '' }}

      - name: Notify deployment success via Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_TELEGRAM_ID }}" \
            -d "text=✅ InstaAgent v${{ github.sha }} deployed to production at $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -d "parse_mode=HTML"
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.ADMIN_TELEGRAM_ID != '' }}
        continue-on-error: true

  # ── 6. Security Scan ───────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-lint]
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./instaagent/backend
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true