# ═══════════════════════════════════════════════════════════════════════════════
# InstaAgent — Enterprise Docker Compose
# All services: api, worker, beat, web, nginx, redis, postgres
# Usage:
#   Development:  docker-compose up --build
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

# ── Shared extension fields ────────────────────────────────────────────────────
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env
  volumes:
    - ./backend/.env:/app/.env:ro
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - instaagent-net

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: instaagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instaagent}
      POSTGRES_USER: ${POSTGRES_USER:-instaagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/migration_enterprise.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
    ports:
      - "5432:5432" # Remove in production; keep only for local dev
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-instaagent} -d ${POSTGRES_DB:-instaagent}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - instaagent-net

  # ── Redis (Celery broker + OAuth state) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: instaagent-redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme_redis} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - instaagent-net

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    container_name: instaagent-api
    expose:
      - "8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.instaagent.service=api"
      - "com.instaagent.version=${APP_VERSION:-2.0.0}"

  # ── Celery Worker (background jobs: photo processing, posting) ───────────────
  worker:
    <<: *backend-common
    container_name: instaagent-worker
    command: >
      celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=4 --queues=default,photos,posts --hostname=worker@%h
    healthcheck:
      test: [ "CMD", "celery", "-A", "app.workers.celery_app.celery_app", "inspect", "ping", "--timeout", "5" ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    labels:
      - "com.instaagent.service=worker"

  # ── Celery Beat (scheduler: token refresh, analytics reports) ────────────────
  beat:
    <<: *backend-common
    container_name: instaagent-beat
    command: >
      celery -A app.workers.celery_app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./backend/.env:/app/.env:ro
      - beat_schedule:/tmp
    labels:
      - "com.instaagent.service=beat"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: instaagent-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - instaagent-net
    labels:
      - "com.instaagent.service=web"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: instaagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - instaagent-net
    labels:
      - "com.instaagent.service=nginx"
  # ── Certbot (SSL — optional, enable for production) ──────────────────────────
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - certbot_www:/var/www/certbot
  #     - certbot_conf:/etc/letsencrypt
  #   entrypoint: >
  #     sh -c "trap exit TERM; while :; do
  #       certbot renew --webroot -w /var/www/certbot --quiet;
  #       sleep 12h & wait $!;
  #     done"

  # ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  beat_schedule:
    driver: local
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  instaagent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
