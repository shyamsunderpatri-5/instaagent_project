# ═══════════════════════════════════════════════════════════════════════════════
# InstaAgent — Production Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  api:
    image: ghcr.io/your-org/instaagent-backend:latest # Use pre-built image
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    image: ghcr.io/your-org/instaagent-backend:latest
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  beat:
    image: ghcr.io/your-org/instaagent-backend:latest
    environment:
      ENVIRONMENT: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/your-org/instaagent-frontend:latest # Use pre-built image
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    # In production, prefer Supabase Cloud over self-hosted Postgres.
    # If using self-hosted, enable automatic backups:
    command: >
      postgres -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    command: >
      redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD} --save 900 1 --save 300 10 --appendonly yes --loglevel warning
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    # Uncomment to enable SSL with Let's Encrypt
    # volumes:
    #   - certbot_conf:/etc/letsencrypt:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
