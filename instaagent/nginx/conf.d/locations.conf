# ═══════════════════════════════════════════════════════════════════════════════
# InstaAgent — Nginx Location Rules (shared between HTTP and HTTPS blocks)
# ═══════════════════════════════════════════════════════════════════════════════

# ── Security Headers (applied to all responses) ─────────────────────────────
add_header X-Frame-Options           "SAMEORIGIN"            always;
add_header X-Content-Type-Options    "nosniff"               always;
add_header X-XSS-Protection          "1; mode=block"         always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com wss:;" always;

# ── Auth Endpoints (strict rate limit) ─────────────────────────────────────
location ~ ^/api/v1/auth/(login|register|forgot-password|verify-otp|reset-password) {
    limit_req zone=auth_strict burst=5 nodelay;
    limit_req_log_level warn;

    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
}

# ── File Upload (25MB limit, separate rate zone) ────────────────────────────
location ~ ^/api/v1/posts/(create|upload) {
    limit_req zone=upload burst=10 nodelay;
    client_max_body_size 25m;

    proxy_pass             http://backend;
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       Connection        "";
    proxy_read_timeout     120s;    # Photo processing can take up to 2 min
    proxy_send_timeout     120s;
    proxy_request_buffering off;    # Stream uploads directly
}

# ── Telegram & Instagram Webhooks (no rate limit — Meta sends bursts) ───────
location ~ ^/api/v1/webhooks/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# ── General API (rate limited) ───────────────────────────────────────────────
location /api/ {
    limit_req zone=api_general burst=30 nodelay;

    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

# ── FastAPI Documentation ────────────────────────────────────────────────────
location ~ ^/(docs|redoc|openapi\.json)$ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
}

# ── Backend Health Check (internal only) ────────────────────────────────────
location /health {
    proxy_pass http://backend/health;
    access_log off;
}

# ── Next.js Static Assets (cache aggressively) ──────────────────────────────
location /_next/static/ {
    proxy_pass         http://frontend;
    proxy_cache        api_cache;
    proxy_cache_valid  200 1d;
    proxy_cache_use_stale error timeout updating;
    add_header         Cache-Control "public, max-age=31536000, immutable";
    access_log         off;
}

location /static/ {
    proxy_pass    http://frontend;
    add_header    Cache-Control "public, max-age=86400";
    access_log    off;
}

# ── Frontend (Next.js — all other routes) ───────────────────────────────────
location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";   # WebSocket / HMR support
    proxy_read_timeout 60s;

    # Cache HTML pages briefly (avoids hammering Next.js on every request)
    proxy_cache            api_cache;
    proxy_cache_valid      200 10s;
    proxy_cache_bypass     $cookie_session $http_authorization;
    proxy_no_cache         $cookie_session $http_authorization;
    proxy_cache_use_stale  error timeout;
    add_header             X-Cache-Status $upstream_cache_status;
}

# ── Rate Limit Error Page ────────────────────────────────────────────────────
error_page 429 @too_many;
location @too_many {
    default_type application/json;
    return 429 '{"detail":"Too many requests. Please slow down and try again in a moment.","code":429}';
}