# ═══════════════════════════════════════════════════════════════════════════════
# InstaAgent — Enterprise Nginx Configuration
# Features: rate limiting, gzip, security headers, SSL-ready, WebSocket proxy
# ═══════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log main buffer=16k flush=5s;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    server_tokens      off;                     # Don't expose nginx version
    client_max_body_size 25m;                   # Allow photo uploads up to 25MB
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Rate Limiting Zones ─────────────────────────────────────────────────
    # General API limit: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    # Auth endpoints: strict — 10 req/min per IP (prevent brute-force)
    limit_req_zone $binary_remote_addr zone=auth_strict:10m  rate=10r/m;
    # File upload: 20 req/min per IP
    limit_req_zone $binary_remote_addr zone=upload:10m       rate=20r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 20;

    # ── Upstream: FastAPI Backend ────────────────────────────────────────────
    upstream backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: Next.js Frontend ───────────────────────────────────────────
    upstream frontend {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ── Proxy Cache (optional but recommended for static API responses) ──────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # ════════════════════════════════════════════════════════════════════════
    # Server Block — HTTP (with Let's Encrypt challenge support)
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (for certbot SSL setup)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For production with a real domain, redirect HTTP → HTTPS:
        # return 301 https://$host$request_uri;

        include /etc/nginx/conf.d/locations.conf;
    }

    # ════════════════════════════════════════════════════════════════════════
    # Server Block — HTTPS (uncomment when SSL certificate is available)
    # ════════════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache   shared:SSL:50m;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}